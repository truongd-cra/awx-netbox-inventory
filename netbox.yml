plugin: netbox.netbox.nb_inventory

api_endpoint: https://netbox.reginaassumpta.qc.ca/
validate_certs: false

config_context: false
interfaces: false
services: false

query_filters:
  - status: active

group_by:
  - device_roles
  - platforms

compose:
  inventory_hostname: name
  ansible_host: primary_ip4.address.split('/')[0] if primary_ip4 else ''
